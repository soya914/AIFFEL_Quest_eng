# YOLO11 학습 설정 (풍력 발전기 파손 탐지 — 도메인 맞춤형)
# train.py가 이 파일을 읽어 학습을 실행합니다.

model: yolo11s.pt
device: mps

hyperparameters:
  epochs: 50
  batch: 8          # M1 16GB RAM — 32는 스왑 유발, 8 권장
  imgsz: 640
  patience: 10
  workers: 0        # Mac+MPS에서 메모리·스왑 부담 감소
  project: runs/detect
  name: train
  seed: 42
  pretrained: true
  optimizer: auto
  cos_lr: true
  warmup_epochs: 3
  close_mosaic: 10

# 팀 도메인 분석 기반 데이터 증강 (references.md · report.md EXP 2/3)
augmentation:
  # 풍력 터빈: 중력·블레이드 방향상 상하 반전 절대 금지
  flipud: 0.0
  # 드론 촬영 좌우 대칭·각도 다양성
  fliplr: 0.5
  # 안개·흐린 날씨·빛 반사 → 밝기/채도/명도 변화 (Brightness)
  hsv_h: 0.02
  hsv_s: 0.6
  hsv_v: 0.5
  # 미세 균열·스크래치 보존: 과도한 기하 변형 억제
  degrees: 5.0
  translate: 0.1
  scale: 0.4
  shear: 0.0
  perspective: 0.0
  # 소형 Damage 탐지: mosaic 유지, mixup은 약하게
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.0
  erasing: 0.2

# OOM·스왑 발생 시 순차적으로 시도할 배치 크기 (16GB Mac 기준)
oom_fallback_batches: [8, 4, 2]
