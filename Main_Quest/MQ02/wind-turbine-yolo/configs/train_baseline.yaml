# Baseline 학습 설정 (YOLO11n Nano — 베이스라인 비교군)
# 실행: python train.py --config configs/train_baseline.yaml --no-report

model: yolo11n.pt
device: mps

hyperparameters:
  epochs: 20
  batch: 8
  imgsz: 640
  patience: 10
  workers: 0
  project: runs/detect
  name: baseline
  seed: 42
  pretrained: true
  optimizer: auto
  cos_lr: true
  warmup_epochs: 3
  close_mosaic: 10
  exist_ok: true

# 도메인 규칙(flipud=0)은 동일 적용, 증강은 최소화(베이스라인)
augmentation:
  flipud: 0.0
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.4
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.3
  shear: 0.0
  perspective: 0.0
  mosaic: 0.5
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.0

oom_fallback_batches: [8, 4, 2]
